name: Release

# Auto-version + build Windows installers + publish a GitHub Release.
# Adapted from the Tauri v2 CI/CD guide for Vuoom (pnpm + Cargo workspace).
#
# TRIGGER: every push to main (auto-bump patch + build MSI/NSIS + publish), plus manual
# dispatch. The check-and-bump job skips when there are no new commits since the last tag.
# GIF export uses the built-in pure-Rust encoder, so no gifski sidecar is required.

on:
  workflow_dispatch:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  # ─── Job 1: version check + bump (cheap runner) ───────────────────────────
  check-and-bump:
    runs-on: ubuntu-latest
    outputs:
      should_release: ${{ steps.bump.outputs.should_release }}
      version: ${{ steps.bump.outputs.version }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v7
        with:
          fetch-depth: 0 # full history: list tags + count commits since last tag

      - name: Check for changes and bump version
        id: bump
        run: |
          # tauri.conf.json is the source of truth for the app version.
          CURRENT_VERSION=$(jq -r '.version' src-tauri/tauri.conf.json)
          echo "Current version: $CURRENT_VERSION"

          if git tag -l "v$CURRENT_VERSION" | grep -q "v$CURRENT_VERSION"; then
            echo "Tag v$CURRENT_VERSION already exists"
            COMMITS_SINCE=$(git rev-list "v$CURRENT_VERSION"..HEAD --count 2>/dev/null || echo "0")
            echo "Commits since v$CURRENT_VERSION: $COMMITS_SINCE"

            if [ "$COMMITS_SINCE" -eq "0" ]; then
              echo "No new commits since last release — skipping"
              echo "should_release=false" >> $GITHUB_OUTPUT
              echo "version=$CURRENT_VERSION" >> $GITHUB_OUTPUT
              exit 0
            fi

            # Auto-bump patch.
            IFS='.' read -r MAJOR MINOR PATCH <<< "$CURRENT_VERSION"
            NEW_VERSION="$MAJOR.$MINOR.$((PATCH + 1))"
            echo "Bumping version: $CURRENT_VERSION -> $NEW_VERSION"

            # Keep all three version locations in sync. NOTE: this is a Cargo WORKSPACE —
            # the Rust version lives in the ROOT Cargo.toml [workspace.package]; src-tauri
            # inherits it via `version.workspace = true`.
            jq --arg v "$NEW_VERSION" '.version = $v' src-tauri/tauri.conf.json > tmp.json && mv tmp.json src-tauri/tauri.conf.json
            jq --arg v "$NEW_VERSION" '.version = $v' package.json > tmp.json && mv tmp.json package.json
            sed -i "s/^version = \"$CURRENT_VERSION\"/version = \"$NEW_VERSION\"/" Cargo.toml

            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add src-tauri/tauri.conf.json package.json Cargo.toml
            git commit -m "chore: bump version to $NEW_VERSION [skip ci]"
            git push

            echo "should_release=true" >> $GITHUB_OUTPUT
            echo "version=$NEW_VERSION" >> $GITHUB_OUTPUT
          else
            echo "Tag v$CURRENT_VERSION does not exist — first release"
            echo "should_release=true" >> $GITHUB_OUTPUT
            echo "version=$CURRENT_VERSION" >> $GITHUB_OUTPUT
          fi

  # ─── Job 2: build + publish (Windows) ─────────────────────────────────────
  #
  # DRAFT-THEN-PROMOTE (manual ship gate):
  # This job builds the installers, signs them, and creates the GitHub Release —
  # but as a DRAFT (releaseDraft: true). A draft release is NOT visible at
  # `releases/latest`, which is exactly the URL the updater polls
  # (see src-tauri/tauri.conf.json → plugins.updater.endpoints:
  #  https://github.com/Razee4315/Vuoom/releases/latest/download/latest.json).
  # So no user auto-updates on a raw push to main — a single bad commit can't
  # ship to everyone.
  #
  # TO SHIP A RELEASE: open the draft in GitHub → Releases, review it, and click
  # "Publish release". Publishing the draft is what makes it the latest release
  # and exposes latest.json to the auto-updater, delivering it to all users.
  release:
    needs: check-and-bump
    if: needs.check-and-bump.outputs.should_release == 'true'
    runs-on: windows-latest
    steps:
      - name: Checkout repository (with bumped version)
        uses: actions/checkout@v7
        with:
          ref: main

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: swatinem/rust-cache@v2

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 22

      - name: Setup pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 10

      - name: Install frontend dependencies
        run: pnpm install --frozen-lockfile

      - name: Build and Release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Updater signing — set these as repo secrets (see docs/AUTO_UPDATE.md).
          # tauri-action signs the bundles and uploads `latest.json` to the release.
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          tauriScript: pnpm tauri
          tagName: v__VERSION__
          releaseName: 'Vuoom v__VERSION__'
          releaseBody: |
            ## Vuoom v__VERSION__

            Screen recordings that zoom where it matters — a free, native Windows
            cinematic screen recorder that exports polished demo GIFs.

            ### Installation
            - **`.msi`** — Windows installer (recommended)
            - **`.exe`** — NSIS installer
          # DRAFT gate: the release (with all artifacts + signed latest.json) is
          # created but stays hidden from `releases/latest` — and thus from the
          # auto-updater — until a maintainer clicks "Publish release" in the
          # GitHub UI. tauri-action uploads artifacts to draft releases fine.
          releaseDraft: true
          prerelease: false
