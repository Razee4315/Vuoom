# cargo-deny configuration — enforces Vuoom's Apache-2.0 / no-copyleft posture.
# Docs: https://embarkstudios.github.io/cargo-deny/
# Run locally with: cargo deny check
#
# The `[licenses] allow` list is an allow-list: any license (or SPDX expression
# that cannot be satisfied by an allowed license) is DENIED. This is what keeps
# GPL/AGPL/LGPL out of the tree — they are simply never allowed. The list below
# was derived from the full resolved dependency graph (`cargo metadata`).

[graph]
# Resolve the default feature set only — matches what we actually ship.
all-features = false

[advisories]
# Warn (don't hard-fail CI) on yanked crates; error on known vulnerabilities.
yanked = "warn"
# Only flag unmaintained crates we depend on DIRECTLY. The transitive tree pulls a pile of
# unmaintained-but-harmless crates we cannot swap (gtk3 bindings via tauri's Linux target,
# unic-* and ttf-parser via glyphon, paste/proc-macro-error via macros) — those are their
# parents' problem, and erroring on them would make every CI run red for nothing actionable.
unmaintained = "workspace"
ignore = [
    # quick-xml 0.39.x DoS advisories (quadratic duplicate-attribute check, unbounded
    # namespace allocations). Pulled transitively by tauri tooling to parse local, trusted
    # XML — not attacker-controlled input. The fix is in a newer minor the tauri tree
    # doesn't accept yet; Dependabot will pick it up when it does.
    "RUSTSEC-2026-0194",
    "RUSTSEC-2026-0195",
]

[licenses]
# Permissive licenses present in (or acceptable for) the dependency tree.
# Copyleft licenses (GPL/AGPL/LGPL) are intentionally absent → denied.
allow = [
    "MIT",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Zlib",
    "Unicode-3.0",
    "MPL-2.0",
    "BSL-1.0",
    "CC0-1.0",
    "CDLA-Permissive-2.0",
    "Unlicense",
    "0BSD",
]
confidence-threshold = 0.8

[bans]
# Duplicate dependency versions bloat the binary but don't block the build.
multiple-versions = "warn"
wildcards = "allow"

[sources]
# Only crates.io / official git sources are expected.
unknown-registry = "warn"
unknown-git = "warn"
