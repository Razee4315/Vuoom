<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#0e0e0f" />
    <title>Vuoom</title>
    <!-- Anti-flash: paint the dark default background + a loader before the app CSS/JS load,
         so the launch window shows a branded splash instead of a black flash. -->
    <style>
      html,
      body,
      #root {
        margin: 0;
        height: 100%;
        background: #0e0e0f;
      }
      #splash {
        position: fixed;
        inset: 0;
        z-index: 9999;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 22px;
        background: #0e0e0f;
        transition: opacity 0.25s ease;
      }
      #splash.hide {
        opacity: 0;
        pointer-events: none;
      }
      #splash svg {
        width: 64px;
        height: 64px;
        animation: splash-breathe 1.8s ease-in-out infinite;
      }
      @keyframes splash-breathe {
        50% {
          opacity: 0.6;
        }
      }
    </style>
  </head>

  <body>
    <noscript>You need to enable JavaScript to run this app.</noscript>
    <div id="splash">
      <svg viewBox="0 0 32 32" fill="none" aria-label="Vuoom">
        <path
          d="M6.5 8 L16 25.5 L25.5 8"
          stroke="#ffffff"
          stroke-width="5"
          stroke-linecap="round"
          stroke-linejoin="round"
        />
        <circle cx="25.5" cy="8" r="4.6" fill="#e5484d" />
      </svg>
    </div>
    <div id="root"></div>

    <script src="/src/index.tsx" type="module"></script>
  </body>
</html>
